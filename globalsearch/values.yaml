dockerRegistry:
  enabled: false
busybox:
  image: busybox
  tag: 1.37.0
image:
  tag: 6.0.32
  pullPolicy: IfNotPresent
vault:
  agentInjector:
    enabled: false
    address: http://vault.vault.svc.cluster.local:8200
    role: globalsearch
    secretPath: secret/data/globalsearch
    template: |
      {{- with secret "secret/data/globalsearch" -}}
      export DB_CONNECTION="{{ .Data.data.dbConnection }}"
      export RABBITMQ_CONNECTION="{{ .Data.data.rabbitmqConnection }}"
      export REDIS_CONNECTION="{{ .Data.data.redisConnection }}"
      export ELASTIC_USER="{{ .Data.data.elasticUser }}"
      export ELASTIC_PASSWORD="{{ .Data.data.elasticPassword }}"
      {{- end -}}
    annotations: {}
  csi:
    enabled: false
    provider: vault
    address: http://vault.vault.svc.cluster.local:8200
    role: globalsearch
    mountPath: /mnt/secrets-store
    secretObjects:
    - secretName: globalsearch-vault-secrets
      type: Opaque
      data:
      - key: dbConnection
        objectName: dbConnection
      - key: rabbitmqConnection
        objectName: rabbitmqConnection
      - key: redisConnection
        objectName: redisConnection
      - key: elasticUser
        objectName: elasticUser
      - key: elasticPassword
        objectName: elasticPassword
    parameters:
    - secretPath: secret/data/globalsearch
      objectName: dbConnection
      objectAlias: dbConnection
    - secretPath: secret/data/globalsearch
      objectName: rabbitmqConnection
      objectAlias: rabbitmqConnection
    - secretPath: secret/data/globalsearch
      objectName: redisConnection
      objectAlias: redisConnection
    - secretPath: secret/data/globalsearch
      objectName: elasticUser
      objectAlias: elasticUser
    - secretPath: secret/data/globalsearch
      objectName: elasticPassword
      objectAlias: elasticPassword
webApi:
  replicaCount: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  image:
    repository: registry.creatio.com/gs-web-api
  resources:
    requests:
      memory: 120Mi
      cpu: 20m
    limits:
      memory: 250Mi
      cpu: 100m
  service:
    type: ClusterIP
    port: 80
    externalTrafficPolicy: Cluster
    nodePort: ''
  ingress:
    enabled: false
    host: web-api.onsite.com
    path: /
    pathType: Prefix
    className: nginx
    annotations:
      ingress.kubernetes.io/ssl-redirect: 'false'
      ingress.kubernetes.io/rewrite-target: /
  env:
    ignoredEntities: UsrVwEmployee,UsrVwEmployeeFile,VwSysProcessLog,SysPrcHistoryLog,ActivityFile,MLModel,MLModelFile,SysSettings,VwWebServiceV2,Activity,UsrVwEmailActivity,CyclicTasks,CallCdr,CallCdrFile
  lifecycle:
    preStop:
      enabled: true
      sleepSeconds: 10
  podAntiAffinity:
    enabled: false
    weight: 100
    topologyKey: kubernetes.io/hostname
  affinity: {}
  tolerations: []
  nodeSelector: {}
  workerThreads: 25
  completionPortThreads: 25
webIndexingService:
  replicaCount: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  image:
    repository: registry.creatio.com/gs-web-indexing-service
  service:
    type: ClusterIP
    port: 80
    externalTrafficPolicy: Cluster
    nodePort: ''
  resources:
    requests:
      memory: 200Mi
      cpu: 100m
    limits:
      memory: 300Mi
      cpu: 200m
  ingress:
    enabled: false
    host: indexing-service.onsite.com
    path: /
    pathType: Prefix
    className: nginx
    annotations:
      ingress.kubernetes.io/ssl-redirect: 'false'
      ingress.kubernetes.io/rewrite-target: /
  affinity: {}
  tolerations: []
  nodeSelector: {}
  publisherHighPrioritySilencePeriodSec: 30
  publisherHighPriorityMaxEntitiesPerSilencePeriod: 5
  workerThreads: 200
  completionPortThreads: 200
searchService:
  replicaCount: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  image:
    repository: registry.creatio.com/gs-search-service
  service:
    type: ClusterIP
    port: 80
    externalTrafficPolicy: Cluster
    nodePort: ''
  resources:
    requests:
      memory: 100Mi
      cpu: 20m
    limits:
      memory: 200Mi
      cpu: 100m
  ingress:
    enabled: false
    host: search-service.onsite.com
    path: /
    pathType: Prefix
    className: nginx
    annotations:
      ingress.kubernetes.io/ssl-redirect: 'false'
      ingress.kubernetes.io/rewrite-target: /
    elastic:
      enableEndpoint: false
    rabbitmq:
      enableEndpoint: false
  affinity: {}
  tolerations: []
  nodeSelector: {}
scheduler:
  replicaCount: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  image:
    repository: registry.creatio.com/gs-scheduler
  resources:
    requests:
      memory: 80Mi
      cpu: 20m
    limits:
      memory: 200Mi
      cpu: 100m
  env:
    fillQueueInterval: 30000
  affinity: {}
  tolerations: []
  nodeSelector: {}
worker:
