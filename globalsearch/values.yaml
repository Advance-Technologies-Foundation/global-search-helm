  image:
    repository: registry.creatio.com/gs-worker-single
  resources:
    requests:
      memory: 80Mi
      cpu: 20m
    limits:
      memory: 350Mi
      cpu: 100m
  env:
    indexingCommandTimeout: 10
  affinity: {}
  tolerations: []
  nodeSelector: {}
workerSingleReplay:
  replicaCount: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  image:
    repository: registry.creatio.com/gs-worker-single-replay
  resources:
    requests:
      memory: 80Mi
      cpu: 10m
    limits:
      memory: 150Mi
      cpu: 50m
  affinity: {}
  tolerations: []
  nodeSelector: {}
workerSingleTask:
  replicaCount: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  image:
    repository: registry.creatio.com/gs-worker-single-task
  resources:
    requests:
      memory: 80Mi
      cpu: 20m
    limits:
      memory: 150Mi
      cpu: 300m
  affinity: {}
  tolerations: []
  nodeSelector: {}
workerQueriedSingleTask:
  replicaCount: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  image:
    repository: registry.creatio.com/gs-worker-queried-single-task
  elasticsearch:
    scrollBatchSize: 0
    scrollTimeout: 60000
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 150m
  affinity: {}
  tolerations: []
  nodeSelector: {}
log4Net:
  debugMode: false
  mountPath: /app/config
  level: DEBUG
  grayLog:
    enabled: false
    AMQP:
      host: graylog-rabbitmq
      port: 5672
      userName: user
      password: password
      virtualHost: /
      exchange: gs-logs
      routingKey: gs-logs
global:
  circuitBreaker:
    enable: true
  elasticsearch:
    url: ''
    publicUrl: ''
    user: elastic
    password: elastic-password
    existingSecret: ''
    existingSecretKeys:
      username: username
      password: password
      connectionString: connectionString
    enableDebugMode: false
    traceDebugInfo: false
    traceDebugInfoForIndex: ''
    tlsSecretName: ''
    tls:
      enable: true
      certificate:
        ca:
          name: ca.crt
          path: /app/certs/elasticsearch
        copyFrom:
          secretName: ''
          fullSecretNameOverride: ''
  security:
    allowInsecureImages: true
  searchService:
    url: http://search-service:80
  identityProvider:
    url: ''
    useOAuth: false
  webApi:
    url: ''
  rabbitmq:
    host: globalsearch-rabbitmq
    vhost: /
    port: 5672
    user: null
    password: null
    existingSecret: ''
    existingSecretKeys:
      connectionString: rabbitmqConnectionString
    queuePriorityEnable: false
    connectionSettings:
      networkRecoveryInterval: 00:00:05
      automaticRecoveryEnabled: true
      requestedConnectionTimeout: 10000
    tls:
      enable: false
    qname:
      inbox: gs-inbox
      primaryInbox: gs-primary-inbox
      outbox: gs-outbox
      singleTaskInbox: gs-single-task-inbox
      singleQueriedTaskInbox: gs-single-queried-task-inbox
      singleInbox: gs-single-inbox
      singleOutbox: gs-single-outbox
  db:
    host: globalsearch-postgresql
    port: 5432
    user: postgres
    password: postgres-password
    existingSecret: ''
    existingSecretKeys:
      connectionString: connectionString
    database: postgres
    additionalParams: Pooling=true;MinPoolSize=0;MaxPoolSize=200;
    type: postgresql
    provider: ServiceStack.OrmLite.PostgreSqlDialect, ServiceStack.OrmLite.PostgreSQL, Culture=neutral, PublicKeyToken=null
    postgresTls:
      enable: false
      sslMode: Require
      trustServerCertificate: false
      caCertificatePath: /app/certs/postgres/ca.crt
      caCertificateSecretName: globalsearch-postgresql-crt
      caCertificateKey: ca.crt
    creatioDbCa:
      enabled: false
      secretName: globalsearch-creatio-postgresql-ca
      key: ca.crt
      inlinePem: ''
      certificatePath: /app/certs/postgres/creatio/ca.crt
  redis:
    host: globalsearch-redis-master
    port: 6379
    database: 1
    password: redis-password
    existingSecret: ''
    existingSecretKeys:
      connectionString: connectionString
    additionalParams: ',abortConnect=true,allowAdmin=true'
    connectAttempts: 5
    reconnectInterval: 0.00:00:05
    defaultExpiration: 0.01:00:00
    tlsSecretName: ''
    tls:
      enable: false
  redisTls:
    enable: false
    sslHost: ''
    caCertificatePath: /app/certs/redis/ca.crt
    caCertificateSecretName: globalsearch-redis-crt
    caCertificateKey: ca.crt
  creatioDbCa:
    enabled: false
  postgresTls:
    enable: false
  requestTimeOut: 600000
  incrementDays: 30
  indexingContentLength: 500
  pullIndexationConfigEnabled: true
startupProbe:
  enabled: true
  failureThreshold: 160
  periodSeconds: 5
  timeoutSeconds: 10
livenessProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 10
readinessProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3
  timeoutSeconds: 10
redis:
  enabled: true
  fullnameOverride: globalsearch-redis
  host: globalsearch-redis-master
  auth:
    enabled: true
    password: redis-password
    existingSecret: ''
  image:
    registry: registry.creatio.com
    repository: globalsearch-redis
    tag: 6.0.30
    pullPolicy: IfNotPresent
  tls:
    enabled: false
  commonConfiguration: |-
    appendonly yes
    save ""
  master:
    persistence:
      enabled: false
    resources:
      requests:
        memory: 128Mi
        cpu: 70m
      limits:
        memory: 256Mi
        cpu: 70m
  replica:
    replicaCount: 0
rabbitmq:
  enabled: true
  fullnameOverride: globalsearch-rabbitmq
  image:
    registry: registry.creatio.com
    pullPolicy: IfNotPresent
    repository: globalsearch-rabbitmq
    tag: 6.0.30
  auth:
    username: rabbitmq-user
    password: rabbitmq-password
  extraEnvVars:
  - name: RABBITMQ_MNESIA_BASE
    value: /opt/bitnami/rabbitmq/.rabbitmq/mnesia
  - name: RABBITMQ_DEFAULT_USER
    value: rabbitmq-user
  - name: RABBITMQ_DEFAULT_PASS
    value: rabbitmq-password
  persistence:
    enabled: false
    mountPath: /opt/bitnami/rabbitmq/.rabbitmq/mnesia
    subPath: ''
  volumePermissions:
    enabled: false
  command:
  - /bin/bash
  - -ec
  args:
  - |
    exec docker-entrypoint.sh rabbitmq-server
  service:
    type: ClusterIP
postgresql:
  enabled: true
  fullnameOverride: globalsearch-postgresql
  image:
    registry: registry.creatio.com
    repository: globalsearch-postgresql
    tag: 6.0.30
    pullPolicy: IfNotPresent
  tls:
    enabled: false
  primary:
    extraEnvVars:
    - name: PGDATA
      value: /var/lib/postgresql/data
    - name: POSTGRESQL_PASSWORD
      value: postgres-password
    containerSecurityContext:
      enabled: true
      runAsUser: 1001
      runAsGroup: 1001
      runAsNonRoot: true
      readOnlyRootFilesystem: false
    podSecurityContext:
      fsGroup: 1001
    persistence:
      enabled: false
      size: 2Gi
      mountPath: /var/lib/postgresql
      accessModes:
      - ReadWriteOnce
    resources:
      requests:
        memory: 512Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 100m
  auth:
    username: postgres
    password: postgres-password
    database: postgres
    forcePassword: true
elasticsearch:
  enabled: true
  fullnameOverride: ''
  url: ''
  image: docker.elastic.co/elasticsearch/elasticsearch
  imageTag: 8.19.8
  clusterName: elasticsearch
  replicas: 1
  discovery:
    type: single-node
  minimumMasterNodes: 1
  esJavaOpts: -Xms2g -Xmx2g
  resources:
    requests:
      cpu: 1000m
      memory: 4Gi
    limits:
      cpu: 1000m
      memory: 4Gi
  persistence:
    enabled: false
  volumeClaimTemplate:
    accessModes:
    - ReadWriteOnce
    resources:
      requests:
        storage: 5Gi
  createCert: true
  protocol: https
  esConfig:
    elasticsearch.yml: |
      xpack.security.enabled: true
  secret:
    enabled: true
    password: elastic-password
  antiAffinity: soft
