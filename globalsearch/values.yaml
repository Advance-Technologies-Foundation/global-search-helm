  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  image:
    repository: registry.creatio.com/gs-worker
  resources:
    requests:
      memory: 100Mi
      cpu: 50m
    limits:
      memory: 400Mi
      cpu: 300m
  env:
    indexingCommandTimeout: 900
    maxIndexingPagesCount: 100
  affinity: {}
  tolerations: []
  nodeSelector: {}
workerPrimary:
  replicaCount: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  image:
    repository: registry.creatio.com/gs-worker-primary
  resources:
    requests:
      memory: 100Mi
      cpu: 50m
    limits:
      memory: 400Mi
      cpu: 300m
  env:
    indexingCommandTimeoutSec: 900
    maxIndexingPagesCount: 100
  affinity: {}
  tolerations: []
  nodeSelector: {}
workerReplay:
