      maxUnavailable: 0
  image:
    repository: registry.creatio.com/gs-worker-replay
  resources:
    requests:
      memory: 80Mi
      cpu: 10m
    limits:
      memory: 150Mi
      cpu: 50m
  affinity: {}
  tolerations: []
  nodeSelector: {}
workerSingle:
