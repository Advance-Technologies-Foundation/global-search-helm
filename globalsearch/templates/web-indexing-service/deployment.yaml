apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-web-indexing-service
  labels:
    app: {{ .Release.Name }}-web-indexing-service
    chart: {{ template "gs.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
spec:
  replicas: {{ .Values.webIndexingService.replicaCount }}
{{- with .Values.webIndexingService.strategy }}
  strategy:
{{ toYaml . | indent 4  }}
{{ end }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-web-indexing-service
      release: {{ .Release.Name }}
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        timestamp: {{ now | quote }}
      labels:
        app: {{ .Release.Name }}-web-indexing-service
        release: {{ .Release.Name }}
    spec:
      volumes:
{{ if .Values.global.elasticsearch.tls.enable }}
        - name: tls-certs
          secret:
            secretName: {{ include "global.elasticsearch.tlsSecretName" . }}
            items:
              - key: {{ .Values.global.elasticsearch.tls.certificate.ca.name }}
                path: {{ .Values.global.elasticsearch.tls.certificate.ca.name }}
{{- end }}
{{ if .Values.global.postgresTls.enable }}
        - name: postgres-tls-certs
          secret:
            secretName: {{ .Values.global.postgresTls.caCertificateSecretName }}
            items:
              - key: {{ .Values.global.postgresTls.caCertificateKey }}
                path: {{ .Values.global.postgresTls.caCertificateKey }}
{{- end }}
{{ if .Values.global.creatioDbCa.enabled }}
        - name: creatio-postgres-ca
          secret:
            secretName: {{ .Values.global.creatioDbCa.secretName }}
            items:
              - key: {{ .Values.global.creatioDbCa.key }}
                path: {{ .Values.global.creatioDbCa.key }}
{{- end }}
{{ if .Values.global.redisTls.enable }}
        - name: redis-tls-certs
          secret:
            secretName: {{ .Values.global.redisTls.caCertificateSecretName }}
            items:
              - key: {{ .Values.global.redisTls.caCertificateKey }}
                path: {{ .Values.global.redisTls.caCertificateKey }}
{{- end }}
{{ if .Values.global.rabbitmq.tls.enable }}
        - name: rabbitmq-tls-certs
          secret:
            secretName: {{ include "global.rabbitmq.tlsSecretName" . }}
            items:
              - key: {{ .Values.global.rabbitmq.tls.certificate.ca.name }}
                path: {{ .Values.global.rabbitmq.tls.certificate.ca.name }}
{{- end }}
        - name: log4net-file
          configMap:
            name: {{ .Release.Name }}-logging-configmap
            items:
              - key: log4net.config
                path: log4net.config
{{ if .Values.webIndexingService.nodeName }}
      nodeName: {{ .Values.webIndexingService.nodeName }}
{{- end }}
{{ if .Values.image.pullSecrets }}
      imagePullSecrets:
        {{ toYaml .Values.image.pullSecrets | indent 8 }}
{{- end }}
      initContainers:
{{- if (include "global.rabbitmq.useCustomCaCertificate" . | trim | eq "true") }}
        - name: wait-for-rabbitmq-cert
          image: {{ .Values.busybox.image }}:{{ .Values.busybox.tag }}
          command:
            - sh
            - -c
            - >
              echo "Waiting for RabbitMQ certificate secret...";
              until [ -f {{ .Values.global.rabbitmq.tls.certificate.ca.path }}/{{ .Values.global.rabbitmq.tls.certificate.ca.name }} ];
              do
                echo "Certificate not available yet...";
                sleep 5;
              done;
              echo "Certificate is available. Proceeding...";
          volumeMounts:
            - name: rabbitmq-tls-certs
              mountPath: {{ .Values.global.rabbitmq.tls.certificate.ca.path }}
              readOnly: true
{{- end }}
{{ if .Values.global.elasticsearch.tls.enable }}
        - name: wait-for-es-cert
          image: {{ .Values.busybox.image }}:{{ .Values.busybox.tag }}
          command:
            - sh
            - -c
            - >
              echo "Waiting for Elasticsearch certificate secret...";
              until [ -f {{ .Values.global.elasticsearch.tls.certificate.ca.path }}/{{ .Values.global.elasticsearch.tls.certificate.ca.name }} ];
              do
                echo "Certificate not available yet...";
                sleep 5;
              done;
              echo "Certificate is available. Proceeding...";
          volumeMounts:
            - name: tls-certs
              mountPath: {{ .Values.global.elasticsearch.tls.certificate.ca.path }}
              readOnly: true
{{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.webIndexingService.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          volumeMounts:
            - name: log4net-file
              mountPath: {{ .Values.log4Net.mountPath }}
{{ if .Values.global.elasticsearch.tls.enable }}
            - name: tls-certs
              mountPath: {{ .Values.global.elasticsearch.tls.certificate.ca.path }}
              readOnly: true
{{- end }}
{{ if .Values.global.postgresTls.enable }}
            - name: postgres-tls-certs
              mountPath: {{ .Values.global.postgresTls.caCertificatePath | dir }}
              readOnly: true
{{- end }}
{{ if .Values.global.creatioDbCa.enabled }}
            - name: creatio-postgres-ca
              mountPath: {{ .Values.global.creatioDbCa.certificatePath | dir }}
              readOnly: true
{{- end }}
{{ if .Values.global.redisTls.enable }}
            - name: redis-tls-certs
              mountPath: {{ .Values.global.redisTls.caCertificatePath | dir }}
              readOnly: true
{{- end }}
{{ if .Values.global.rabbitmq.tls.enable }}
            - name: rabbitmq-tls-certs
              mountPath: {{ .Values.global.rabbitmq.tls.certificate.ca.path }}
              readOnly: true
{{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          env:
            - name: IndexEntityPublisherConfiguration__QueueName
              value: {{ .Values.global.rabbitmq.qname.singleTaskInbox }}
            - name: IndexEntityPublisherConfiguration__QueuePriorityEnable
              value: '{{ .Values.global.rabbitmq.queuePriorityEnable }}'
            - name: QueriedIndexEntityPublisherConfiguration__QueueName
              value: {{ .Values.global.rabbitmq.qname.singleQueriedTaskInbox }}
            - name: QueriedIndexEntityPublisherConfiguration__QueuePriorityEnable
              value: '{{ .Values.global.rabbitmq.queuePriorityEnable }}'
            - name: RabbitMQSettings__QueuePriorityEnable
              value: '{{ .Values.global.rabbitmq.queuePriorityEnable }}'
            - name: RabbitMQSettings__ConnectionSettings__SslOptions__IsEnabled
              value: "{{ .Values.global.rabbitmq.tls.enable }}"
{{- if (include "global.rabbitmq.useCustomCaCertificate" . | trim | eq "true") }}
            - name: RabbitMQSettings__ConnectionSettings__SslOptions__CaCertificatePath
              value: "{{ .Values.global.rabbitmq.tls.certificate.ca.path }}/{{ .Values.global.rabbitmq.tls.certificate.ca.name }}"
{{- end }}
{{ if .Values.global.rabbitmq.tls.enable }}
            - name: RabbitMQSettings__ConnectionSettings__SslOptions__SkipCertificateValidation
              value: "{{ .Values.global.rabbitmq.tls.certificate.skipCertificateValidation }}"
{{- end }}
            - name: PublisherPriority__HighPrioritySilencePeriodSec
              value: "{{ .Values.webIndexingService.publisherHighPrioritySilencePeriodSec | int64 }}"
            - name: PublisherPriority__HighPriorityMaxEntitiesPerSilencePeriod
              value: "{{ .Values.webIndexingService.publisherHighPriorityMaxEntitiesPerSilencePeriod | int64  }}"
            - name: workerThreads
              value: "{{ .Values.webIndexingService.workerThreads | int64  }}"
            - name: completionPortThreads
              value: "{{ .Values.webIndexingService.completionPortThreads | int64  }}"
            - name: RedisCacheOptions__ConnectionString
              valueFrom:
                secretKeyRef:
                  name: {{ include "redis.secretName" . }}
                  key: {{ include "redis.connectionStringKey" . }}
            - name: RedisTlsOptions__Enable
              value: "{{ .Values.global.redisTls.enable }}"
            - name: RedisTlsOptions__SslHost
              value: "{{ default .Values.global.redis.host .Values.global.redisTls.sslHost }}"
            - name: RedisTlsOptions__CaCertificatePath
              value: "{{ .Values.global.redisTls.caCertificatePath }}"
            - name: RedisCacheOptions__ConnectAttempts
              value: {{ .Values.global.redis.connectAttempts | quote }}
            - name: RedisCacheOptions__ReconnectInterval
              value: {{ .Values.global.redis.reconnectInterval }}
            - name: RedisCacheOptions__DefaultExpiration
              value: {{ .Values.global.redis.defaultExpiration }}
            - name: PostgresTlsOptions__Enable
              value: "{{ .Values.global.postgresTls.enable }}"
            - name: PostgresTlsOptions__SslMode
              value: "{{ .Values.global.postgresTls.sslMode }}"
            - name: PostgresTlsOptions__TrustServerCertificate
              value: "{{ .Values.global.postgresTls.trustServerCertificate }}"
            - name: PostgresTlsOptions__RootCertificatePath
              value: "{{ .Values.global.postgresTls.caCertificatePath }}"
            - name: PostgresTlsOptions__GlobalSearchRootCertificatePath
              value: "{{ .Values.global.postgresTls.caCertificatePath }}"
{{ if .Values.global.creatioDbCa.enabled }}
            - name: PostgresTlsOptions__CreatioRootCertificatePath
              value: "{{ .Values.global.creatioDbCa.certificatePath }}"
{{- end }}
            - name: elasticSearchUrl
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-global-config-map
                  key: es.url
            - name: elasticLogin
              valueFrom:
                secretKeyRef:
                  name: {{ include "elasticsearch.secretName" . }}
                  key: {{ include "elasticsearch.usernameKey" . }}
            - name: elasticPassword
              valueFrom:
                secretKeyRef:
                  name: {{ include "elasticsearch.secretName" . }}
                  key: {{ include "elasticsearch.passwordKey" . }}
            - name: ElasticSearch__Tls__Enable
              value: "{{ .Values.global.elasticsearch.tls.enable }}"
{{ if .Values.global.elasticsearch.tls.enable }}
            - name: ElasticSearch__Tls__CaCertificatePath
              value: "{{ .Values.global.elasticsearch.tls.certificate.ca.path }}/{{ .Values.global.elasticsearch.tls.certificate.ca.name }}"
{{- end }}
            - name: RabbitMQSettings__ConnectionString
              valueFrom:
                secretKeyRef:
                  name: {{ include "rabbitmq.secretName" . }}
                  key: {{ include "rabbitmq.connectionStringKey" . }}
            - name: Log4NetPath
              value: {{ .Values.log4Net.mountPath }}/log4net.config
{{ if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: /liveness
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
{{- end }}
{{ if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: /readiness
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
{{- end }}
          resources:
{{ toYaml .Values.webIndexingService.resources | indent 12 }}
    {{- with .Values.webIndexingService.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
    {{- end }}
    {{- with .Values.webIndexingService.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
    {{- end }}
    {{- with .Values.webIndexingService.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
    {{- end }}
